spec:
  name: clermont-ai-portal
  region: nyc

  services:
    - name: web
      dockerfile_path: apps/web/Dockerfile
      source_dir: /
      http_port: 3000
      instance_count: 1
      instance_size_slug: professional-xs
      health_check:
        http_path: /
      routes:
        - path: /
      envs:
        - key: NEXT_PUBLIC_SUPABASE_URL
          value: "${NEXT_PUBLIC_SUPABASE_URL}"
          type: GENERAL
        - key: SUPABASE_ANON_KEY
          value: "${SUPABASE_ANON_KEY}"
          type: SECRET
        - key: WORKER_SECRET
          value: "${WORKER_SECRET}"
          type: SECRET
        - key: WORKER_URL
          value: "${WORKER_URL}"
          type: GENERAL

    - name: worker
      dockerfile_path: apps/worker/Dockerfile
      source_dir: /
      http_port: 3001
      instance_count: 1
      instance_size_slug: professional-s
      health_check:
        http_path: /health
      envs:
        - key: NEXT_PUBLIC_SUPABASE_URL
          value: "${NEXT_PUBLIC_SUPABASE_URL}"
          type: GENERAL
        - key: SUPABASE_SERVICE_ROLE_KEY
          value: "${SUPABASE_SERVICE_ROLE_KEY}"
          type: SECRET
        - key: SUPABASE_ANON_KEY
          value: "${SUPABASE_ANON_KEY}"
          type: SECRET
        - key: ANTHROPIC_API_KEY
          value: "${ANTHROPIC_API_KEY}"
          type: SECRET
        - key: GOOGLE_GEMINI_API_KEY
          value: "${GOOGLE_GEMINI_API_KEY}"
          type: SECRET
        - key: WORKER_SECRET
          value: "${WORKER_SECRET}"
          type: SECRET
        - key: WORKER_CORS_ORIGIN
          value: "${WORKER_CORS_ORIGIN}"
          type: GENERAL
